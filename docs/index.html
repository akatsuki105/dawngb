<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DuGB</title>
    <script src="https://cdn.jsdelivr.net/gh/golang/go@go1.21.5/misc/wasm/wasm_exec.js"></script>
  </head>

  <body>
    <script>
      (async () => {
        const resp = await fetch("dugb.wasm");
        const go = new Go();
        const buffer = await resp.arrayBuffer();
        const result = await WebAssembly.instantiate(buffer, go.importObject);
        go.run(result.instance);

        window.addEventListener("message", (e) => {
          if (e.origin.includes("localhost") || e.origin.includes("dugb") || e.origin.includes("akatsuki105")) {
            switch (e.data[0]) {
              case "press":
                globalThis.press(e.data[1], e.data[2]);
                break;
              case "save":
                const sram = globalThis.save(); // Uint8Array
                if (sram.length > 0) {
                  // download file
                  const blob = new Blob([sram], { type: "application/octet-stream" });
                  const url = URL.createObjectURL(blob);
                  const a = document.createElement("a");
                  a.href = url;
                  a.download = "dugb.sav";
                  a.click();
                  a.remove();
                }
                break;
              default:
                console.log(`Unknown message: ${e.data}`);
                break;
            }
          }
        });
      })();
    </script>
  </body>
</html>
