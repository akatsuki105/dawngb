<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DuGB</title>
    <script src="https://cdn.jsdelivr.net/gh/golang/go@go1.21.5/misc/wasm/wasm_exec.js"></script>
  </head>

  <body>
    <script>
      window.addEventListener("message", (event) => {
        if (event.origin === "http://localhost:5173") {
          event.source.postMessage(globalThis, event.origin)
        } else {
          console.log("Unknown origin: " + event.origin);
        }
      })

      (async () => {
        const resp = await fetch("dugb.wasm");
        const go = new Go();
        const buffer = await resp.arrayBuffer();
        const result = await WebAssembly.instantiate(buffer, go.importObject);
        go.run(result.instance);
      })();
    </script>
  </body>
</html>
